<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — TechFix</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="../index.html" class="navbar-marca"><span class="logo-chip">TF</span> TechFix</a>
        <ul class="navbar-menu" style="display:flex;">
            <li><a href="registro.html">¿No tienes cuenta? Regístrate</a></li>
        </ul>
    </div>
</nav>

<div class="panel-formulario">
    <div class="marca-formulario"><span class="logo-chip">TF</span> TechFix</div>
    <h2>Bienvenido de nuevo</h2>
    <p class="subtitulo">Ingresa para ver el estado de tus dispositivos</p>

    <div class="alerta mensaje-formulario" style="display:none;"></div>

    <form id="form-login">
        <div class="campo">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
        </div>
        <div class="campo">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-login">Ingresar</button>
    </form>

    <div class="separador-o">o</div>

    <p class="enlace-secundario" style="margin-top:0;">
        <a href="../admin/login.html">Acceder como administrador →</a>
    </p>
    <p class="enlace-secundario">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
    document.getElementById('form-login').addEventListener('submit', async function (e) {
        e.preventDefault();

        const caja = document.querySelector('.mensaje-formulario');
        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.textContent = 'Ingresando...';

        const resultado = await iniciarSesion({
            correo: document.getElementById('correo').value.trim(),
            contrasena: document.getElementById('contrasena').value
        });

        btn.disabled = false;
        btn.textContent = 'Ingresar';

        if (resultado.ok) {
            window.location.href = 'dashboard.html';
        } else {
            caja.textContent = resultado.mensaje;
            caja.className = 'alerta alerta-info mensaje-formulario';
            caja.style.display = 'flex';
        }
    });
</script>
</body>
</html>
