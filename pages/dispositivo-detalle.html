<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle del dispositivo — DATA FIX</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="../index.html" class="navbar-marca">DATA<span class="marca-dot">FIX</span></a>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="btn-theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
            <button class="navbar-toggle" aria-label="Abrir menú">☰</button>
        </div>
        <ul class="navbar-menu">
            <li><a href="dashboard.html">Mi Panel</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="agendar-cita.html">Agendar cita</a></li>
            <li><a href="#" id="link-logout">Cerrar sesión</a></li>
        </ul>
    </div>
</nav>

<div class="contenedor" style="padding-top:32px;">
    <a href="dashboard.html" class="volver"><i class="bi bi-arrow-left me-1"></i> Volver a mis dispositivos</a>

    <div class="detalle-encabezado">
        <div>
            <span class="ticket-id mono" id="detalle-ticket">#TF-2026-0000</span>
            <h1 id="detalle-titulo">Dispositivo</h1>
        </div>
        <span class="led-estado" id="detalle-led"><span class="punto"></span><span id="detalle-estado-texto">—</span></span>
    </div>

    <!-- Barra de progreso del flujo de estados -->
    <div class="caja">
        <h3><i class="bi bi-bar-chart-steps me-2"></i> Progreso de la reparación</h3>
        <div class="progreso-estados" id="progreso-estados">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <div class="caja">
        <h3><i class="bi bi-info-circle me-2"></i> Información general</h3>
        <div id="info-general">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <div class="caja">
        <h3><i class="bi bi-tools me-2"></i> Servicios aplicados</h3>
        <div id="servicios-aplicados">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <div class="caja">
        <h3><i class="bi bi-clock-history me-2"></i> Línea de tiempo</h3>
        <div class="timeline" id="timeline-estados">
            <!-- Se llena dinámicamente -->
        </div>
    </div>
</div>

<footer style="margin-top:20px;">
    <div class="contenedor footer-bottom" style="border:none; padding-top:0;">
        <span>© <span class="anio-actual"></span> DATA FIX</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/dispositivo.js"></script>
</body>
</html>
