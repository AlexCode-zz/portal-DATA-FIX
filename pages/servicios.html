<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios — DATA FIX</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="../index.html" class="navbar-marca">DATA<span class="marca-dot">FIX</span></a>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="btn-theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
            <button class="navbar-toggle" aria-label="Abrir menú">☰</button>
        </div>
        <ul class="navbar-menu">
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="servicios.html" class="activo">Servicios</a></li>
            <li><a href="agendar-cita.html">Agendar cita</a></li>
            <li id="nav-invitado" style="display:contents;">
                <a href="login.html" class="btn btn-secondary btn-sm">Iniciar sesión</a>
                <a href="registro.html" class="btn btn-primary btn-sm">Crear cuenta</a>
            </li>
            <li id="nav-usuario" style="display:none;">
                <a href="dashboard.html" class="btn btn-secondary btn-sm">Mi Panel</a>
                <a href="#" id="link-logout-publico" class="btn btn-primary btn-sm">Cerrar sesión</a>
            </li>
        </ul>
    </div>
</nav>

<section class="seccion" style="padding-bottom:0;">
    <div class="contenedor">
        <div class="encabezado-seccion">
            <span class="eyebrow">Catálogo completo</span>
            <h2>Nuestros servicios</h2>
            <p>Precios referenciales. El costo final se confirma después del diagnóstico gratuito.</p>
        </div>

        <div class="tabs" id="filtro-tipos">
            <button class="tab-btn activo" data-filtro="todos">Todos</button>
            <button class="tab-btn" data-filtro="ciberseguridad">Ciberseguridad</button>
            <button class="tab-btn" data-filtro="hardware">Hardware</button>
            <button class="tab-btn" data-filtro="software">Software</button>
            <button class="tab-btn" data-filtro="mantenimiento">Mantenimiento</button>
        </div>

        <div class="grid" id="lista-servicios" style="padding-bottom:70px;">
            <!-- Se llena dinámicamente -->
        </div>
    </div>
</section>

<footer>
    <div class="contenedor footer-bottom" style="border:none; padding-top:0;">
        <span>© <span class="anio-actual"></span> DATA FIX</span>
        <a href="../index.html" style="color:#8791AE;">&larr; Volver al inicio</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/nav-session.js"></script>
<script>
    const listaServicios = document.getElementById('lista-servicios');
    const botonesFiltro = document.querySelectorAll('#filtro-tipos .tab-btn');

    // Como la tabla "servicios" no guarda un emoji, lo elegimos según el tipo
    const ICONO_POR_TIPO = {
        ciberseguridad: '<i class="bi bi-shield-check"></i>',
        hardware: '<i class="bi bi-cpu"></i>',
        software: '<i class="bi bi-floppy"></i>',
        mantenimiento: '<i class="bi bi-brush"></i>',
        otro: '<i class="bi bi-tools"></i>'
    };

    const SERVICIOS_DEFAULT = [
        {
            nombre_servicio: "Implementación de medidas de ciberseguridad",
            descripcion: "Servicio orientado a la protección preventiva de entornos informáticos en Windows. Comprende la configuración de defensas digitales, auditoría de puertos, protección de red y ajuste de parámetros de privacidad para resguardar la integridad de los datos frente a accesos no autorizados.",
            tipo: "ciberseguridad",
            precio: 40.00
        },
        {
            nombre_servicio: "Respaldo y recuperación de información en dispositivos móviles",
            descripcion: "Solución técnica enfocada en la preservación de activos digitales en celulares utilizando el software especializado Dr.Fone Todo en Uno. Incluye la extracción, copia de seguridad y restauración de fotografías, contactos y documentos importantes en situaciones de fallo del sistema, cambio de dispositivo o pérdida accidental de datos.",
            tipo: "software",
            precio: 35.00
        },
        {
            nombre_servicio: "Recuperación de contraseñas y accesos bloqueados",
            descripcion: "Asistencia técnica especializada en teléfonos y dispositivos móviles mediante el uso de Dr.Fone. Abarca el restablecimiento de accesos, remoción de patrones, PINs, contraseñas de pantalla y bypass de protección FRP (Factory Reset Protection / bloqueo de cuenta Google), garantizando siempre la verificación previa de la legítima propiedad del equipo.",
            tipo: "software",
            precio: 30.00
        },
        {
            nombre_servicio: "Diagnóstico y resolución de fallas de software",
            descripcion: "Análisis detallado para identificar y corregir errores en el sistema operativo Windows. Abarca la solución de conflictos de controladores, reparación de archivos dañados del sistema y corrección de bloqueos o cierres inesperados de aplicaciones.",
            tipo: "software",
            precio: 25.00
        },
        {
            nombre_servicio: "Eliminación de virus, malware y programas no deseados",
            descripcion: "Limpieza lógica profunda orientada a detectar y desinfectar archivos maliciosos, spyware y programas secundarios no deseados. Incluye la instalación y configuración de Norton Premium para proporcionar protección activa en tiempo real contra amenazas digitales.",
            tipo: "software",
            precio: 30.00
        },
        {
            nombre_servicio: "Optimización del rendimiento del equipo",
            descripcion: "Acondicionamiento del sistema operativo para maximizar la velocidad de respuesta del computador. Incluye la aceleración del tiempo de arranque, limpieza de archivos temporales acumulados y depuración del registro de Windows.",
            tipo: "mantenimiento",
            precio: 25.00
        },
        {
            nombre_servicio: "Mantenimiento preventivo",
            descripcion: "Revisión técnica periódica diseñada para anticipar fallas operativas. Contempla la comprobación del estado de salud del almacenamiento (disco duro/SSD), revisión general de componentes internos y verificación del rendimiento global del sistema.",
            tipo: "mantenimiento",
            precio: 20.00
        },
        {
            nombre_servicio: "Limpieza interna y externa",
            descripcion: "Mantenimiento físico integral del hardware mediante el uso de herramientas e insumos especializados. Incluye la remoción de polvo interno con sopladora eléctrica RONIX, reemplazo de pasta térmica de alto rendimiento ARCTIC MX-4 y desinfección/limpieza del chasis y pantalla con paños 3M.",
            tipo: "hardware",
            precio: 25.00
        }
    ];

    let serviciosCargados = [];

    async function cargarServicios() {
        listaServicios.innerHTML = `<p class="vacio">Cargando servicios...</p>`;

        const { data, error } = await supabaseClient
            .from('servicios')
            .select('*')
            .eq('activo', true)
            .order('tipo', { ascending: true });

        if (error || !data || data.length === 0) {
            serviciosCargados = SERVICIOS_DEFAULT;
        } else {
            serviciosCargados = data;
        }
        renderServicios('todos');
    }

    function renderServicios(filtro) {
        const items = filtro === 'todos'
            ? serviciosCargados
            : serviciosCargados.filter(s => s.tipo === filtro);

        if (items.length === 0) {
            listaServicios.innerHTML = `<p class="vacio">No hay servicios en esta categoría.</p>`;
            return;
        }

        listaServicios.innerHTML = items.map(s => `
            <div class="tarjeta-servicio">
                <div class="icono-servicio">${ICONO_POR_TIPO[s.tipo] || '<i class="bi bi-tools"></i>'}</div>
                <span class="etiqueta-tipo">${s.tipo}</span>
                <h3>${s.nombre_servicio}</h3>
                <p>${s.descripcion ?? ''}</p>
                <div class="pie-servicio">
                    <span class="precio">$${Number(s.precio).toFixed(2)}</span>
                    <a href="agendar-cita.html" class="btn btn-secondary btn-sm">Solicitar</a>
                </div>
            </div>
        `).join('');
    }

    botonesFiltro.forEach(btn => {
        btn.addEventListener('click', () => {
            botonesFiltro.forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            renderServicios(btn.dataset.filtro);
        });
    });

    cargarServicios();
</script>
</body>
</html>
