<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios — Panel Admin DATA FIX</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="dashboard.html" class="navbar-marca">DATA<span class="marca-dot">FIX</span> <span style="font-weight:500; color:rgba(255,255,255,.45); font-size:0.8rem; letter-spacing:.04em">/ ADMIN</span></a>
        <ul class="nav-menu" style="display:flex; align-items:center; gap:12px;">
            <li>
                <button class="btn-theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </li>
            <li style="display:flex; align-items:center; gap:8px;">
                <span class="avatar-inicial" id="iniciales-admin-actual">--</span>
                <span style="font-size:.88rem; color:rgba(255,255,255,.8);" id="nombre-admin-actual">Cargando...</span>
            </li>
            <li><a href="#" id="link-logout-admin" style="color:rgba(255,255,255,.65);">Cerrar sesión</a></li>
        </ul>
    </div>
</nav>

<div class="layout-admin">
    <aside class="sidebar">
        <span class="grupo-titulo">Gestión</span>
        <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="clientes.html"><i class="bi bi-people"></i> Clientes</a>
        <a href="dispositivos.html"><i class="bi bi-laptop"></i> Dispositivos</a>
        <a href="servicios.html" class="activo"><i class="bi bi-tools"></i> Servicios</a>
        <a href="reparaciones.html"><i class="bi bi-wrench"></i> Reparaciones</a>
        <a href="citas.html"><i class="bi bi-calendar-event"></i> Citas</a>
        <a href="reportes.html"><i class="bi bi-bar-chart-line"></i> Reportes</a>
    </aside>

    <main class="contenido-admin">
        <h1>Catálogo de Servicios</h1>
        <p class="descripcion-pagina">Administra los servicios técnicos que ofrece el taller.</p>

        <!-- Formulario de nuevo servicio -->
        <div class="caja">
            <h3><i class="bi bi-folder-plus text-primary"></i> Nuevo servicio</h3>
            <div class="alerta mensaje-formulario" style="display:none;"></div>
            <form id="form-crear-servicio">
                <div class="campo">
                    <label for="serv-nombre">Nombre del servicio</label>
                    <input type="text" id="serv-nombre" name="nombre" placeholder="Ej: Eliminación de virus y malware" required>
                </div>
                <div class="campo">
                    <label for="serv-descripcion">Descripción</label>
                    <textarea id="serv-descripcion" name="descripcion" placeholder="Describe en qué consiste el servicio..."></textarea>
                </div>
                <div class="campo-fila">
                    <div class="campo">
                        <label for="serv-precio">Precio base (MXN)</label>
                        <input type="number" id="serv-precio" name="precio" min="0" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="campo">
                        <label for="serv-tipo">Categoría</label>
                        <select id="serv-tipo" name="tipo">
                            <option value="ciberseguridad">Ciberseguridad</option>
                            <option value="hardware">Hardware</option>
                            <option value="software">Software</option>
                            <option value="mantenimiento">Mantenimiento</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primario mt-1"><i class="bi bi-plus-lg me-1"></i> Crear servicio</button>
            </form>
        </div>

        <!-- Catálogo existente -->
        <div class="barra-superior-admin">
            <h3><i class="bi bi-grid me-2 text-primary"></i>Catálogo actual</h3>
        </div>

        <div class="grilla-servicios" id="grid-servicios-admin">
            <!-- Dinámico -->
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin-guard.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
