<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios — Panel Admin TechFix</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="dashboard.html" class="navbar-marca"><span class="logo-chip">TF</span> TechFix <span style="font-weight:400; color:var(--pizarra); font-size:0.85rem;">/ Admin</span></a>
        <ul class="navbar-menu" style="display:flex;">
            <li><span style="font-size:0.88rem; color:var(--pizarra);"><span class="avatar-inicial" id="iniciales-admin-actual">--</span><span id="nombre-admin-actual">Cargando...</span></span></li>
            <li><a href="#" id="link-logout-admin">Cerrar sesión</a></li>
        </ul>
    </div>
</nav>

<div class="layout-admin">
    <aside class="sidebar">
        <span class="grupo-titulo">Gestión</span>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="dispositivos.html">💻 Dispositivos</a>
        <a href="servicios.html" class="activo">🧰 Servicios</a>
        <a href="reparaciones.html">🔧 Reparaciones</a>
        <a href="citas.html">📅 Citas</a>
    </aside>

    <main class="contenido-admin">
        <h1>Gestión de Servicios</h1>
        <p class="descripcion-pagina">Administra el catálogo de servicios del taller</p>

        <div class="caja">
            <h3>➕ Nuevo servicio</h3>
            <div class="alerta mensaje-formulario" style="display:none;"></div>
            <form id="form-crear-servicio"></form>
                <div class="campo">
                    <label>Nombre del servicio</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="campo">
                    <label>Descripción</label>
                    <textarea name="descripcion"></textarea>
                </div>
                <div class="campo-fila">
                    <div class="campo">
                        <label>Precio (USD)</label>
                        <input type="number" name="precio" min="0" step="0.01" required>
                    </div>
                    <div class="campo">
                        <label>Tipo</label>
                        <select name="tipo">
                            <option>hardware</option>
                            <option>software</option>
                            <option>mantenimiento</option>
                            <option>otro</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primario mt-1">Crear servicio</button>
            </form>
        </div>

        <h3 style="font-family:var(--fuente-display); color:var(--tinta); font-size:1.05rem; margin-bottom:16px;">Catálogo actual</h3>

        <div class="grid" id="grid-servicios-admin">
            <!-- Se llena dinámicamente -->
        </div>
    </main>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin-guard.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
