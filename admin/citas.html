<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citas — Panel Admin DATA FIX</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="dashboard.html" class="navbar-marca">DATA<span class="marca-dot">FIX</span> <span style="font-weight:500; color:rgba(255,255,255,.45); font-size:0.8rem; letter-spacing:.04em">/ ADMIN</span></a>
        <ul class="nav-menu" style="display:flex;">
            <li style="display:flex; align-items:center; gap:8px;">
                <span class="avatar-inicial" id="iniciales-admin-actual">--</span>
                <span style="font-size:.88rem; color:rgba(255,255,255,.8);" id="nombre-admin-actual">Cargando...</span>
            </li>
            <li><a href="#" id="link-logout-admin" style="color:rgba(255,255,255,.65);">Cerrar sesión</a></li>
        </ul>
    </div>
</nav>

<div class="layout-admin">
    <aside class="sidebar">
        <span class="grupo-titulo">Gestión</span>
        <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="clientes.html"><i class="bi bi-people"></i> Clientes</a>
        <a href="dispositivos.html"><i class="bi bi-laptop"></i> Dispositivos</a>
        <a href="servicios.html"><i class="bi bi-tools"></i> Servicios</a>
        <a href="reparaciones.html"><i class="bi bi-wrench"></i> Reparaciones</a>
        <a href="citas.html" class="activo"><i class="bi bi-calendar-event"></i> Citas</a>
        <a href="reportes.html"><i class="bi bi-bar-chart-line"></i> Reportes</a>
    </aside>

    <main class="contenido-admin">
        <h1>Citas Agendadas</h1>
        <p class="descripcion-pagina">Solicitudes de cita enviadas por clientes a través del portal.</p>

        <div class="barra-superior-admin">
            <div class="tabs" style="border:none; margin-bottom:0;">
                <button class="tab-btn activo" data-filtro-estado="todas">Todas</button>
                <button class="tab-btn" data-filtro-estado="Pendiente">Pendientes</button>
                <button class="tab-btn" data-filtro-estado="Confirmada">Confirmadas</button>
                <button class="tab-btn" data-filtro-estado="Atendida">Atendidas</button>
                <button class="tab-btn" data-filtro-estado="Cancelada">Canceladas</button>
            </div>
            <div class="buscador-admin">
                <i class="bi bi-search"></i>
                <input type="text" id="buscador-citas" placeholder="Buscar por nombre o correo...">
            </div>
        </div>

        <div class="tabla-wrapper" style="margin-top:16px;">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Contacto</th>
                        <th>Dispositivo / Servicio</th>
                        <th>Fecha y hora preferida</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-citas">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/whatsapp.js"></script>
<script src="../js/admin-guard.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
