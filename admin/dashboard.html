<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Panel Admin DATA FIX</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<nav class="navbar">
    <div class="contenedor">
        <a href="dashboard.html" class="navbar-marca"><span class="logo-chip">TF</span> DATA FIX <span style="font-weight:400; color:var(--pizarra); font-size:0.85rem;">/ Admin</span></a>
        <ul class="navbar-menu" style="display:flex;">
            <li><span style="font-size:0.88rem; color:var(--pizarra);"><span class="avatar-inicial" id="iniciales-admin-actual">--</span><span id="nombre-admin-actual">Cargando...</span></span></li>
            <li><a href="#" id="link-logout-admin">Cerrar sesión</a></li>
        </ul>
    </div>
</nav>

<div class="layout-admin">
    <aside class="sidebar">
        <span class="grupo-titulo">Gestión</span>
        <a href="dashboard.html" class="activo">📊 Dashboard</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="dispositivos.html">💻 Dispositivos</a>
        <a href="servicios.html">🧰 Servicios</a>
        <a href="reparaciones.html">🔧 Reparaciones</a>
        <a href="citas.html">📅 Citas</a>
    </aside>

    <main class="contenido-admin">
        <h1>Dashboard</h1>
        <p class="descripcion-pagina">Resumen general del negocio</p>

        <div class="resumen-grid" id="resumen-admin" style="margin-top:0;">
            <!-- Se llena dinámicamente -->
        </div>

        <div class="barra-superior-admin">
            <h3 style="font-family:var(--fuente-display); color:var(--tinta); font-size:1.05rem;">Últimos dispositivos ingresados</h3>
            <a href="dispositivos.html" class="btn btn-secundario btn-sm">Ver todos →</a>
        </div>

        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>Cliente</th>
                        <th>Dispositivo</th>
                        <th>Estado</th>
                        <th>Ingreso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-dashboard">
                    <!-- Se llena dinámicamente -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin-guard.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
